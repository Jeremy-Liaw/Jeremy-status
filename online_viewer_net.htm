<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>狀態控制台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0f14;
    --panel: #121821;
    --panel-border: #1f2a37;
    --accent: #39d6c8;
    --accent-dim: #1d4f4a;
    --warn: #f5a623;
    --text: #e8edf2;
    --muted: #6b7b8c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; flex-direction: column;
    min-height: 100vh;
    padding: 24px 18px 32px;
  }
  .eyebrow {
    font-size: 11px; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 4px;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 22px; margin: 0 0 22px;
    color: var(--text);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  button.status-btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: var(--panel);
    border-radius: 10px;
    padding: 20px 10px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
    transition: border-color .15s ease, box-shadow .15s ease, transform .08s ease;
  }
  button.status-btn .icon { font-size: 26px; }
  button.status-btn:active { transform: scale(0.96); }
  button.status-btn.sent {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 18px -4px var(--accent);
  }

  .custom-row {
    margin-top: 14px;
    display: flex; gap: 8px;
  }
  .custom-row input {
    flex: 1; background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 8px; color: var(--text); padding: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
  }
  .custom-row input::placeholder { color: var(--muted); }
  .custom-row button {
    appearance: none; border: 1px solid var(--accent); background: var(--accent-dim);
    color: var(--accent); border-radius: 8px; padding: 0 16px; font-size: 13px;
    font-family: 'JetBrains Mono', monospace; cursor: pointer;
  }

  .log {
    margin-top: auto;
    padding-top: 24px;
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
    min-height: 40px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  .dot.ok { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .setup-banner {
    background: #2a1a0f; border: 1px solid var(--warn); color: var(--warn);
    font-size: 12px; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px;
    line-height: 1.5; display: none;
  }
</style>
</head>
<body>

  <div id="setupBanner" class="setup-banner">
    ⚠ 尚未設定表單資訊。請把最下面的 <code>FORM_ACTION_URL</code> 和 <code>ENTRY_ID</code> 換成你自己的值(看下方 SETUP.md 說明)。
  </div>

  <div class="eyebrow">STATUS · TX</div>
  <h1>我現在在...</h1>

  <div class="grid" id="grid"></div>

  <div class="custom-row">
    <input id="customInput" type="text" placeholder="自訂狀態文字...">
    <button id="customSend">送出</button>
  </div>

  <div class="log">
    <div class="dot" id="connDot"></div>
    <span id="connText">準備就緒</span>
  </div>

<script>
  // ---------------------------------------------------------------
  // 換成你自己表單的值，取得方式見 SETUP.md
  // ---------------------------------------------------------------
  const FORM_ACTION_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSenkh2U43AW6VG2dX-2WqOY2bGm2MerHMwEGLeRfz38Gac1TA/formResponse'; 
  // 例如 https://docs.google.com/forms/d/e/1FAIpQLS.../formResponse
  const ENTRY_ID = 'entry.938162149';               
  // 例如 entry.123456789

  const isConfigured = FORM_ACTION_URL !== 'YOUR_FORM_ACTION_URL' && ENTRY_ID !== 'YOUR_ENTRY_ID';
  if (!isConfigured) document.getElementById('setupBanner').style.display = 'block';

  const STATUSES = [
    { icon: '✅', label: '到達目的地' },
    { icon: '🚌', label: '搭公車中' },
    { icon: '🚃', label: '搭火車中' },
    { icon: '🏫', label: '在學校' },
    { icon: '🚏', label: '下車了' },
    { icon: '🏠', label: '快到家了' },
  ];

  const grid = document.getElementById('grid');
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');

  function render() {
    grid.innerHTML = '';
    STATUSES.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'status-btn';
      btn.dataset.label = s.label;
      btn.innerHTML = `<span class="icon">${s.icon}</span><span>${s.label}</span>`;
      btn.onclick = () => sendStatus(s.label, btn);
      grid.appendChild(btn);
    });
  }
  render();

  document.getElementById('customSend').onclick = () => {
    const val = document.getElementById('customInput').value.trim();
    if (val) { sendStatus(val, null); document.getElementById('customInput').value = ''; }
  };

  async function sendStatus(label, btnEl) {
    if (!isConfigured) {
      connText.textContent = '尚未設定表單資訊';
      return;
    }
    connText.textContent = '送出中...';
    try {
      const body = new URLSearchParams();
      body.append(ENTRY_ID, label);
      // Google 表單不允許跨網域讀取回應，用 no-cors 送出即可（送得出去，但讀不到回應內容，這是正常的）
      await fetch(FORM_ACTION_URL, { method: 'POST', mode: 'no-cors', body });
      document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('sent'));
      if (btnEl) btnEl.classList.add('sent');
      connDot.className = 'dot ok';
      connText.textContent = `已送出：「${label}」`;
    } catch (e) {
      connText.textContent = '送出失敗，檢查網路';
    }
  }
</script>
</body>
</html>
