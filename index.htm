<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>即時狀態</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0f14;
    --panel: #121821;
    --panel-border: #1f2a37;
    --accent: #39d6c8;
    --text: #e8edf2;
    --muted: #6b7b8c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'iansui', monospace;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    width: 100%; max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
  }
  .eyebrow {
    font-size: 11px; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .ping {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(1.4); }
  }
  .status-icon { font-size: 56px; margin-bottom: 10px; }
  .status-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 28px; color: var(--text);
    margin-bottom: 10px; word-break: break-word;
  }
  .meta { font-size: 13px; color: var(--muted); }
  .meta span { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .ping { animation: none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="eyebrow"><span class="ping"></span> LIVE STATUS</div>
    <div class="status-icon" id="icon">📡</div>
    <div class="status-text" id="text">連線中...</div>
    <div class="meta" id="meta">&nbsp;</div>
  </div>

<script>
  // 換成你自己的試算表 ID 和分頁名稱，取得方式見 SETUP.md
  const SHEET_ID = '1XiraAhpsH49KmWTa37AUb97O0vgq_V86vj0Avdzc-zY';
  const SHEET_NAME = '表單回應 1'; // Google 表單連動的試算表分頁預設名稱
  const STATUS_COLUMN_LABEL = '狀態'; // 你在表單裡設定的問題文字，要跟試算表欄位標題一致

  const ICONS = {
    '到達目的地': '✅', '搭公車中': '🚌', '搭火車中': '🚃',
    '在學校': '🏫', '下車了': '🚏', '快到家了': '🏠'
  };

  const textEl = document.getElementById('text');
  const iconEl = document.getElementById('icon');
  const metaEl = document.getElementById('meta');
  let lastUpdate = null;

  function timeAgo(date) {
    const s = Math.floor((Date.now() - date.getTime()) / 1000);
    if (s < 60) return `${s} 秒前`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m} 分鐘前`;
    const h = Math.floor(m / 60);
    return `${h} 小時前`;
  }

  function updateMeta() {
    if (!lastUpdate) return;
    const hh = String(lastUpdate.getHours()).padStart(2, '0');
    const mm = String(lastUpdate.getMinutes()).padStart(2, '0');
    metaEl.innerHTML = `更新於 <span>${hh}:${mm}</span> · ${timeAgo(lastUpdate)}`;
  }

  async function poll() {
    if (SHEET_ID === 'YOUR_SHEET_ID') {
      textEl.textContent = '尚未設定';
      metaEl.textContent = '請先在 status.html 填入 SHEET_ID';
      return;
    }
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
      const res = await fetch(url);
      const raw = await res.text();
      // gviz 回傳格式是 google.visualization.Query.setResponse({...})，要去掉外層包裝再 parse
      const json = JSON.parse(raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1));

      const cols = json.table.cols.map(c => c.label);
      const statusColIdx = 1/*cols.indexOf(STATUS_COLUMN_LABEL)*/;
      const timeColIdx = 0; // 表單的 Timestamp 欄位固定在第一欄

      const rows = json.table.rows;
      const lastRow = rows[rows.length - 1];
      const statusVal = lastRow.c[statusColIdx]?.v ?? '尚無狀態';
      const timeVal = lastRow.c[timeColIdx]?.v; // 格式類似 Date(2026,6,14,15,30,0)

      textEl.textContent = statusVal;
      iconEl.textContent = ICONS[statusVal] || '📡';

      if (timeVal && typeof timeVal === 'string' && timeVal.startsWith('Date(')) {
        const nums = timeVal.match(/\d+/g).map(Number);
        lastUpdate = new Date(nums[0], nums[1], nums[2], nums[3] || 0, nums[4] || 0, nums[5] || 0);
      } else {
        lastUpdate = new Date();
      }
      updateMeta();
    } catch (e) {
      textEl.textContent = '連線失敗';
      metaEl.textContent = '請檢查試算表是否已分享為「知道連結的人可檢視」';
    }
  }

  poll();
  setInterval(poll, 8000);
  setInterval(updateMeta, 15000);
</script>
</body>
</html>
